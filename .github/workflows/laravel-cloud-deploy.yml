name: Laravel Cloud Deploy (reusable)

# Reusable workflow that deploys a Laravel app to a Hostinger Cloud Startup
# subdomain via SSH. Called by app repos (e.g. Codenzia/serveeta).
#
# Prerequisites on the host (one-time per app):
#   1. `~/codenzia/deploy-runtime/` is a git clone of this repo.
#   2. The subdomain exists in hPanel (Hostinger has no API for shared
#      hosting subdomain creation — this stays manual).
#   3. The repo's deploy public key is appended to ~/.ssh/authorized_keys.
#   4. PHP version is set in hPanel.
#
# What the workflow does automatically on first deploy:
#   - Detects "apps/deploy.sh missing" and runs provision-app.sh from the
#     host's deploy-runtime clone — creates apps/shared/{.env,storage,
#     database.sqlite}, drops the activator + .htaccess template.
#   - Subsequent deploys skip the provision step (idempotent).
#
# What you still do manually after the first deploy fires provision:
#   - Seed apps/shared/.env with APP_KEY + DB path + secrets
#     (provision-app.sh prints the exact paths to use).
#   - Add the 2 cron lines (scheduler + queue worker) in hPanel →
#     Advanced → Cron Jobs (provision-app.sh prints them too).

on:
  workflow_call:
    inputs:
      app_name:
        description: "Short app slug (e.g. serveeta) — used as APP env on host"
        required: true
        type: string
      domain:
        description: "Full FQDN (e.g. serveeta.codenzia.com)"
        required: true
        type: string
      siblings:
        description: |
          Multiline list of sibling Composer path-repo packages to clone
          alongside the app, one per line in the format:
            <github-org/repo> <target-dir-relative-to-workspace>
          Example:
            Codenzia/Platform                 platform
            Codenzia/filament-panel-base-dev  filament-panel-base
          Defaults to empty — apps that don't use Composer path repositories
          can omit this input entirely; the clone step then becomes a no-op.
        required: false
        type: string
        default: ""
      demo_seeder:
        description: "Seeder class invoked when fresh=true"
        required: false
        type: string
        default: "DemoSeeder"
      php_bin:
        description: "Absolute path to the PHP binary on the host"
        required: false
        type: string
        default: "/usr/bin/php"
      php_version:
        description: "PHP version installed on the GitHub Actions runner"
        required: false
        type: string
        default: "8.3"
      php_extensions:
        description: "PHP extensions installed on the runner"
        required: false
        type: string
        default: "mbstring,xml,curl,zip,bcmath,intl,gd,mysql"
      node_version:
        description: "Node version on the runner (used for the Vite build)"
        required: false
        type: string
        default: "20"
      fresh:
        description: "Reseed demo data (drops all tables)"
        required: false
        type: boolean
        default: false
      mode:
        description: "release or debug"
        required: false
        type: string
        default: "release"
      migrate:
        description: "Backup existing files (.env / database / uploads)"
        required: false
        type: boolean
        default: false
      source_dir:
        description: |
          Subdirectory inside the caller repo that holds the Laravel app
          (relative to repo root). Use for monorepos where multiple
          skeletons live in subdirs (e.g. aqarkom's tier skeletons at
          aqarkom-lite/, aqarkom-standard/, aqarkom-pro/). Leave empty
          for the single-app-at-root case (every existing caller).
        required: false
        type: string
        default: ""
    # Secrets are declared (so cross-repo inheritance forwards them) but
    # NOT marked required: callers may use `secrets: inherit`, which the
    # workflow_call validator can't resolve at parse time — `required: true`
    # would then reject the call. At runtime, the inherited values flow
    # through normally; if any are missing, the individual step (clone,
    # ssh-agent) will fail with a clear error.
    secrets:
      CODENZIA_PAT:
        required: false
      HOST_HOSTNAME:
        required: false
      HOST_USER:
        required: false
      HOST_PORT:
        required: false
      HOST_SSH_KEY:
        required: false
      HOST_KNOWN_HOSTS:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    # Note: do NOT add `environment:` here. We tried it for deployment-
    # tracking visibility — it scoped secret resolution to that env and
    # broke inheritance from the caller. Secrets resolve cleanly without
    # an env on the job.
    env:
      APP_NAME: ${{ inputs.app_name }}
      DOMAIN: ${{ inputs.domain }}
      DEMO_SEEDER: ${{ inputs.demo_seeder }}
      PHP_BIN: ${{ inputs.php_bin }}
    defaults:
      run:
        # When source_dir is set (monorepo callers), this resolves to
        # `app/<source_dir>` so every default-working-dir step lands inside
        # the chosen tier's skeleton. Single-app callers leave source_dir
        # empty and this stays as `app`.
        working-directory: app${{ inputs.source_dir != '' && format('/{0}', inputs.source_dir) || '' }}
    steps:
      - name: Validate deploy inputs
        working-directory: ${{ github.workspace }}
        env:
          DOMAIN_IN: ${{ inputs.domain }}
          APP_IN: ${{ inputs.app_name }}
          SEEDER_IN: ${{ inputs.demo_seeder }}
          PHPBIN_IN: ${{ inputs.php_bin }}
          MODE_IN: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          [[ "$DOMAIN_IN" =~ ^[a-z0-9]([a-z0-9.-]*[a-z0-9])?$ ]] || { echo "::error::domain '$DOMAIN_IN' contains illegal characters"; exit 1; }
          [[ "$APP_IN"    =~ ^[a-z0-9][a-z0-9_-]*$ ]]            || { echo "::error::app_name '$APP_IN' contains illegal characters"; exit 1; }
          [[ "$SEEDER_IN" =~ ^[A-Za-z0-9\\_]+$ ]]                || { echo "::error::demo_seeder '$SEEDER_IN' contains illegal characters"; exit 1; }
          [[ "$PHPBIN_IN" =~ ^[A-Za-z0-9/._-]+$ ]]               || { echo "::error::php_bin '$PHPBIN_IN' contains illegal characters"; exit 1; }
          [[ "$MODE_IN"   =~ ^(release|debug)$ ]]                || { echo "::error::mode must be release|debug"; exit 1; }

      - name: Checkout app
        uses: actions/checkout@v6
        with:
          path: app

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          extensions: ${{ inputs.php_extensions }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: app${{ inputs.source_dir != '' && format('/{0}', inputs.source_dir) || '' }}/package-lock.json

      - name: Clone sibling Composer packages
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.CODENZIA_PAT }}
          SIBLINGS: ${{ inputs.siblings }}
        run: |
          set -euo pipefail
          while IFS= read -r raw; do
            line="$(echo "$raw" | sed 's/#.*$//' | xargs)"
            [ -z "$line" ] && continue
            read -r repo dest <<<"$line"
            echo "::group::clone $repo -> $dest"
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "$dest"
            echo "::endgroup::"
          done <<< "$SIBLINGS"

      - name: Register sibling path repos in composer.json
        env:
          SIBLINGS: ${{ inputs.siblings }}
        run: |
          set -euo pipefail
          if [ -z "$SIBLINGS" ]; then
            echo "no siblings input; skipping path-repo registration"
            exit 0
          fi
          # Append a path repo for each cloned sibling to composer.json's
          # `repositories` array. Path repos always beat VCS sources for
          # the same package, so composer install will resolve sibling
          # packages from the freshly-cloned local copies (current HEAD of
          # each sibling's main branch) instead of going to GitHub VCS
          # — no Composer github-oauth setup needed, and no dependency on
          # the consuming app having wikimedia/composer-merge-plugin
          # wired up to read composer.local.json. The mutation is
          # in-place on the CI checkout only; the committed composer.json
          # is untouched.
          python3 - <<'PY'
          import json, os
          with open('composer.json', 'r', encoding='utf-8') as f:
              cj = json.load(f)
          cj.setdefault('repositories', [])
          existing = {r.get('url') for r in cj['repositories'] if isinstance(r, dict)}
          added = 0
          for raw in os.environ['SIBLINGS'].splitlines():
              line = raw.split('#', 1)[0].strip()
              if not line:
                  continue
              parts = line.split()
              if len(parts) != 2:
                  continue
              repo, dest = parts
              url = f'../{dest}'
              if url in existing:
                  continue
              cj['repositories'].append({
                  'type': 'path',
                  'url': url,
                  'options': {'symlink': True},
              })
              added += 1
          with open('composer.json', 'w', encoding='utf-8') as f:
              json.dump(cj, f, indent=4)
              f.write('\n')
          print(f'added {added} sibling path repos to composer.json')
          PY

      - name: Create placeholder SQLite DB for boot-time package discovery
        # composer install's post-autoload-dump runs `php artisan
        # package:discover`, which boots every service provider. Some
        # providers (e.g. spatie/laravel-translation-loader) query the DB
        # at boot — fails with "Database file does not exist" if the
        # SQLite file is missing on the CI runner. The real DB lives on
        # the host at apps/shared/database.sqlite; this is just an empty
        # placeholder so the discovery boot can run.
        run: |
          mkdir -p database
          [ -f database/database.sqlite ] || touch database/database.sqlite

      - name: Install PHP dependencies (prod)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Stage artifact (dereference path-repo symlinks)
        run: |
          mkdir -p _artifact
          rsync -aL \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='.claude' \
            --exclude='.agents' \
            --exclude='.gemini' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='public/hot' \
            --exclude='*.log' \
            --exclude='*.sqlite' \
            --exclude='*.map' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='_artifact' \
            ./ _artifact/

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HOST_SSH_KEY }}

      - name: Trust host key
        working-directory: ${{ github.workspace }}
        env:
          HOST_KNOWN_HOSTS: ${{ secrets.HOST_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$HOST_KNOWN_HOSTS" >> ~/.ssh/known_hosts

      - name: Compute release id
        working-directory: ${{ github.workspace }}
        run: |
          REL="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA:0:7}"
          echo "REL=$REL" >> "$GITHUB_ENV"

      - name: Auto-provision app on host (first deploy only)
        # Detects "this subdomain has never been deployed before" by the
        # absence of apps/deploy.sh, and runs provision-app.sh from the
        # host's deploy-runtime clone to create shared/, the activator,
        # the .htaccess template, and the SQLite db. Idempotent: subsequent
        # deploys skip this step in <1s. Subdomain still has to exist in
        # hPanel first (Hostinger has no API for that on shared hosting).
        env:
          HOST_USER: ${{ secrets.HOST_USER }}
          HOST_HOSTNAME: ${{ secrets.HOST_HOSTNAME }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
        working-directory: ${{ github.workspace }}
        run: |
          # Build the remote script locally so $DOMAIN and $APP_NAME resolve
          # to the workflow's resolved values BEFORE being piped to the
          # remote shell (env vars set in `env:` aren't auto-forwarded by ssh).
          REMOTE_SCRIPT=$(cat <<EOF
            set -euo pipefail
            APPS="domains/${DOMAIN}/apps"

            if [ ! -d "domains/${DOMAIN}" ]; then
              echo "FATAL: domains/${DOMAIN}/ does not exist on the host."       >&2
              echo "       Create the subdomain in hPanel first, then re-run."   >&2
              exit 1
            fi

            if [ -x "\${APPS}/deploy.sh" ]; then
              echo "→ \${APPS}/deploy.sh exists; provision step skipped (already provisioned)"
              exit 0
            fi

            if [ ! -x "\$HOME/codenzia/deploy-runtime/provision-app.sh" ]; then
              echo "FATAL: \$HOME/codenzia/deploy-runtime/provision-app.sh not found." >&2
              echo "       Clone Codenzia/deploy-runtime to ~/codenzia/deploy-runtime first." >&2
              exit 1
            fi

            echo "→ Provisioning ${APP_NAME} on ${DOMAIN} (first deploy)"
            bash "\$HOME/codenzia/deploy-runtime/provision-app.sh" "${APP_NAME}" "${DOMAIN}"
            echo "→ Provision done. NEXT: seed shared/.env (APP_KEY + DB path + secrets) and add the cron lines printed above in hPanel."
          EOF
          )
          ssh -p "$HOST_PORT" "${HOST_USER}@${HOST_HOSTNAME}" bash -s <<< "$REMOTE_SCRIPT"

      - name: Rsync release to host
        env:
          HOST_USER: ${{ secrets.HOST_USER }}
          HOST_HOSTNAME: ${{ secrets.HOST_HOSTNAME }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
        run: |
          APPS="domains/${DOMAIN}/apps"
          ssh -p "$HOST_PORT" "${HOST_USER}@${HOST_HOSTNAME}" "mkdir -p \"${APPS}/releases/${REL}\""
          rsync -az --delete -e "ssh -p $HOST_PORT" _artifact/ "${HOST_USER}@${HOST_HOSTNAME}:${APPS}/releases/${REL}/"

      - name: Activate release
        env:
          HOST_USER: ${{ secrets.HOST_USER }}
          HOST_HOSTNAME: ${{ secrets.HOST_HOSTNAME }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
          FRESH: ${{ inputs.fresh }}
          MODE: ${{ inputs.mode }}
          MIGRATE: ${{ inputs.migrate }}
        run: |
          ssh -p "$HOST_PORT" "${HOST_USER}@${HOST_HOSTNAME}" \
            "APP='${APP_NAME}' DOMAIN='${DOMAIN}' REL='${REL}' FRESH='${FRESH}' MODE='${MODE}' MIGRATE='${MIGRATE}' DEMO_SEEDER='${DEMO_SEEDER}' PHP_BIN='${PHP_BIN}' bash \"domains/${DOMAIN}/apps/deploy.sh\""

      - name: Smoke test
        working-directory: ${{ github.workspace }}
        env:
          HOST_USER: ${{ secrets.HOST_USER }}
          HOST_HOSTNAME: ${{ secrets.HOST_HOSTNAME }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
        run: |
          ssh -p "$HOST_PORT" "${HOST_USER}@${HOST_HOSTNAME}" \
            "test -f \"domains/${DOMAIN}/public_html/public/index.php\" \
             && test -L \"domains/${DOMAIN}/public_html/.env\" \
             && test -L \"domains/${DOMAIN}/public_html/storage\""
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "https://${DOMAIN}/up" || echo "warning: /up smoke failed (TLS or DNS not yet ready)"
